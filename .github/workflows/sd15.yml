name: SD15 ONNX Export

on:
  workflow_dispatch:
    inputs:
      model_id:
        description: "Hugging Face model ID"
        required: false
        type: string
        default: "runwayml/stable-diffusion-v1-5"
      output_dir:
        description: "Output directory to upload as artifact"
        required: false
        type: string
        default: "sd15-base"
  push:
    branches: [ "main" ]
    paths:
      - "scripts/export_sd15_onnx.py"
      - "scripts/requirements.txt"
      - ".github/workflows/sd15.yml"

concurrency:
  group: ${{ github.run_id }}
  cancel-in-progress: false

env:
  MODEL_ID: ${{ inputs.model_id != '' && inputs.model_id || 'runwayml/stable-diffusion-v1-5' }}
  OUTPUT_DIR: ${{ inputs.output_dir != '' && inputs.output_dir || 'sd15-base' }}
  HF_HUB_ENABLE_HF_TRANSFER: 1

jobs:
  export-onnx:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Clear pip cache
      run: pip cache purge

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Export SD15 to ONNX
      run: |
        python scripts/export_sd15_onnx.py \
          --model-id "${{ env.MODEL_ID }}" \
          --output-dir "${{ env.OUTPUT_DIR }}"
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}

    - name: Create tar.gz archive
      run: |
        tar -czf sd15-base.tar.gz "${{ env.OUTPUT_DIR }}"

    - name: Upload ONNX artifact (tar.gz)
      uses: actions/upload-artifact@v4
      with:
        name: sd15-base
        path: sd15-base.tar.gz
        retention-days: 7

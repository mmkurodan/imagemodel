name: SDXL ONNX Export

on:
  workflow_dispatch:
    inputs:
      model_id:
        description: "Hugging Face model ID"
        required: false
        type: string
        default: "stabilityai/stable-diffusion-xl-base-1.0"
      output_dir:
        description: "Output directory to upload as artifact"
        required: false
        type: string
        default: "sdxl-onnx"
  push:
    branches: [ "main" ]
    paths:
      - "scripts/export_sdxl_onnx.py"
      - "scripts/requirements.txt"
      - ".github/workflows/sdxl.yml"

# ★ 修正：run ごとに別グループにする（累積 timeout 防止）
concurrency:
  group: ${{ github.run_id }}
  cancel-in-progress: false

env:
  MODEL_ID: ${{ github.event.inputs.model_id || 'stabilityai/stable-diffusion-xl-base-1.0' }}
  OUTPUT_DIR: ${{ github.event.inputs.output_dir || 'sdxl-onnx' }}
  HF_HUB_ENABLE_HF_TRANSFER: 1

jobs:
  export-onnx:
    runs-on: ubuntu-latest

    # ★ 修正：SDXL float32 export は 2〜3 時間かかる
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Clear pip cache
      run: pip cache purge

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Export SDXL to ONNX
      run: |
        python scripts/export_sdxl_onnx.py \
          --model-id "${{ env.MODEL_ID }}" \
          --output-dir "${{ env.OUTPUT_DIR }}"
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}

    - name: Create tar.gz archive
      run: |
        tar -czf sdxl-onnx.tar.gz "${{ env.OUTPUT_DIR }}"

    - name: Upload ONNX artifact (tar.gz)
      uses: actions/upload-artifact@v4
      with:
        name: sdxl-onnx
        path: sdxl-onnx.tar.gz
        retention-days: 7
